<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社区 - 皮卡堂维基百科</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../community.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1><a href="../index.html" style="color: white; text-decoration: none;">皮卡堂维基百科</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">首页</a></li>
                <li><a href="community.html">社区</a></li>
                <li><a href="profile.html">我的</a></li>
            </ul>
        </nav>
    </header>

    <main class="community-main">
        <div class="community-header">
            <h2>皮卡堂社区</h2>
            <p>分享你的游戏日常，与其他玩家交流</p>
        </div>

        <!-- 发布新动态 -->
        <div class="post-form">
            <h3>分享新动态</h3>
            <form id="newPostForm">
                <div class="form-group">
                    <textarea id="postText" placeholder="分享你在皮卡堂的精彩时刻..." rows="4"></textarea>
                </div>
                <div class="form-group">
                    <input type="file" id="postImage" accept="image/*" multiple>
                    <label for="postImage" class="file-label" id="dropZone">
                        <span>📷 添加图片</span>
                        <small>点击选择或拖拽图片到这里</small>
                    </label>
                </div>
                <div class="form-group">
                    <input type="text" id="playerName" placeholder="你的游戏昵称">
                </div>
                <button type="submit">发布动态</button>
            </form>
        </div>

        <!-- 动态列表 -->
        <div class="posts-container">
            <h3>社区动态</h3>
            <div id="postsList">
                <!-- 示例动态 -->
                <div class="post-item">
                    <div class="post-header">
                        <div class="player-info">
                            <div class="avatar">🎮</div>
                            <div class="player-details">
                                <h4>小皮玩家</h4>
                                <span class="post-time">2小时前</span>
                            </div>
                        </div>
                    </div>
                    <div class="post-content">
                        <p>今天终于收集到了全套彩虹家具！房间装修完成啦~ 🌈</p>
                        <div class="post-images">
                            <img src="../images/furniture-placeholder.jpg" alt="彩虹家具">
                        </div>
                    </div>
                    <div class="post-actions">
                        <button class="like-btn">❤️ 12</button>
                        <button class="comment-btn">💬 3</button>
                        <button class="share-btn">🔗 分享</button>
                    </div>
                </div>

                <div class="post-item">
                    <div class="post-header">
                        <div class="player-info">
                            <div class="avatar">🌟</div>
                            <div class="player-details">
                                <h4>时尚达人</h4>
                                <span class="post-time">5小时前</span>
                            </div>
                        </div>
                    </div>
                    <div class="post-content">
                        <p>新买的连衣裙太好看了！搭配小皮鞋简直完美 ✨</p>
                        <div class="post-images">
                            <img src="../images/clothes-placeholder.jpg" alt="新连衣裙">
                        </div>
                    </div>
                    <div class="post-actions">
                        <button class="like-btn">❤️ 8</button>
                        <button class="comment-btn">💬 1</button>
                        <button class="share-btn">🔗 分享</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 回到顶部按钮 -->
    <button id="backToTop" class="back-to-top" onclick="scrollToTop()">
        ⬆️
    </button>

    <footer>
        <p>&copy; 2026 皮卡堂维基百科 - 非官方粉丝网站</p>
    </footer>

    <script src="../community.js"></script>
</body>
</html>
