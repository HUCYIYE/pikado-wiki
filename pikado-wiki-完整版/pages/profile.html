<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 - 皮卡堂维基百科</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../profile.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1><a href="../index.html" style="color: white; text-decoration: none;">皮卡堂维基百科</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">首页</a></li>
                <li><a href="community.html">社区</a></li>
                <li><a href="profile.html">我的</a></li>
            </ul>
        </nav>
    </header>

    <main class="profile-main">
        <div class="profile-header">
            <div class="avatar-section">
                <div class="avatar" id="userAvatar" onclick="uploadAvatar()">🎮</div>
                <button class="change-avatar-btn" onclick="uploadAvatar()">上传头像</button>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>
            <div class="user-info">
                <h2 id="userName">皮卡堂玩家</h2>
                <p id="userBio">这个人很懒，什么都没有留下...</p>
                <button class="edit-profile-btn" onclick="editProfile()">编辑资料</button>
            </div>
        </div>

        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalPosts">0</div>
                <div class="stat-label">发布内容</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalLikes">0</div>
                <div class="stat-label">获得点赞</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="joinDays">1</div>
                <div class="stat-label">加入天数</div>
            </div>
        </div>

        <div class="profile-content">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('posts')">我的发布</button>
                <button class="tab-btn" onclick="showTab('liked')">我的点赞</button>
                <button class="tab-btn" onclick="showTab('settings')">设置</button>
            </div>

            <div id="postsTab" class="tab-content active">
                <div class="my-posts" id="myPostsList">
                    <div class="no-content">还没有发布任何内容</div>
                </div>
            </div>

            <div id="likedTab" class="tab-content">
                <div class="liked-posts" id="likedPostsList">
                    <div class="no-content">还没有点赞任何内容</div>
                </div>
            </div>

            <div id="settingsTab" class="tab-content">
                <div class="settings-section">
                    <h3>个人设置</h3>
                    <div class="setting-item">
                        <label>主题模式</label>
                        <button id="themeToggle" class="setting-btn" onclick="toggleTheme()">🌙 深色模式</button>
                    </div>
                    <div class="setting-item">
                        <label>数据管理</label>
                        <div class="setting-buttons">
                            <button class="setting-btn" onclick="exportMyData()">📤 导出我的数据</button>
                            <button class="setting-btn" onclick="importData()">📥 导入数据</button>
                            <button class="setting-btn danger" onclick="clearMyData()">🗑️ 清除所有数据</button>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label>分享给朋友</label>
                        <div class="setting-buttons">
                            <button class="setting-btn" onclick="generateShareCode()">🔗 生成分享码</button>
                            <button class="setting-btn" onclick="loadFromShareCode()">📲 使用分享码</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 编辑资料模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑个人资料</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>昵称</label>
                    <input type="text" id="editUserName" placeholder="输入你的昵称">
                </div>
                <div class="form-group">
                    <label>个人简介</label>
                    <textarea id="editUserBio" rows="3" placeholder="介绍一下自己吧..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="save-btn" onclick="saveProfile()">保存</button>
                <button class="cancel-btn" onclick="closeEditModal()">取消</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 皮卡堂维基百科 - 非官方粉丝网站</p>
    </footer>

    <script src="../profile.js"></script>
</body>
</html>
