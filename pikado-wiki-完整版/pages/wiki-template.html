<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">维基页面 - 皮卡堂维基百科</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../wiki.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1><a href="../index.html" style="color: white; text-decoration: none;">皮卡堂维基百科</a></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="../index.html">首页</a></li>
                <li><a href="community.html">社区</a></li>
                <li><a href="profile.html">我的</a></li>
            </ul>
        </nav>
    </header>

    <main class="wiki-main">
        <div class="wiki-header">
            <h2 id="wikiTitle">维基页面</h2>
            <button class="add-btn" onclick="toggleAddPost()">➕ 发布新内容</button>
        </div>

        <div class="wiki-content">
            <!-- 发布新内容表单 -->
            <div id="addPostMode" class="content-edit" style="display: none;">
                <div class="edit-form">
                    <div class="form-group">
                        <label>标题：</label>
                        <input type="text" id="postTitleInput" placeholder="输入标题">
                    </div>
                    <div class="form-group">
                        <label>内容：</label>
                        <textarea id="postContentInput" rows="10" placeholder="输入内容描述..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>图片：</label>
                        <input type="file" id="postImageInput" accept="image/*" multiple>
                        <div class="file-drop-zone" id="postDropZone">
                            <span>📷 点击选择或拖拽图片到这里</span>
                        </div>
                        <div id="postImagePreview"></div>
                    </div>
                    <div class="edit-actions">
                        <button onclick="publishPost()" class="save-btn">📤 发布</button>
                        <button onclick="cancelAddPost()" class="cancel-btn">❌ 取消</button>
                    </div>
                </div>
            </div>
            
            <!-- 内容列表显示 -->
            <div id="postsContainer" class="posts-container">
                <p class="no-posts">还没有内容，点击上方按钮发布第一条内容吧！</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 皮卡堂维基百科 - 非官方粉丝网站</p>
    </footer>

    <script src="../wiki.js"></script>
</body>
</html>
